# Manual release: builds the vue app from main and pushes the compiled
# dist/ to the "release" branch, which GitHub Pages serves.
#
# One-time setup: Settings -> Pages -> Deploy from a branch ->
# Branch: release / (root). The old gh-pages branch stays untouched as
# an archive of the old app.
#
# Run it from the Actions tab -> "Release to GitHub Pages" -> Run workflow.
# Each release is a commit on "release": diff releases there, roll back
# by resetting the branch to an earlier commit.
name: Release to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install
        run: npm ci
        working-directory: src

      - name: Test
        run: npm test
        working-directory: src

      - name: Build
        run: npm run build
        working-directory: src

      # Serve the files verbatim — no Jekyll processing on Pages.
      - name: Add .nojekyll
        run: touch src/dist/.nojekyll

      - name: Push dist to release branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release
          publish_dir: src/dist
